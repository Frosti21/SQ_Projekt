name: Build, Test and Static Analysis

on:
  push:
  pull_request:

jobs:
  build-esp32:
    name: Build ESP32 Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build ESP32 Project
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3
          target: esp32
          path: Sensor_ESP32

  build-and-check-raspberry:
    name: Build and Analyze Raspberry Pi Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            make \
            pkg-config \
            libmosquitto-dev \
            libcjson-dev \
            libssl-dev \
            cppcheck

      - name: Static analysis with cppcheck
        run: |
          cppcheck --enable=all --inconclusive --std=c11 \
            --suppress=missingIncludeSystem \
            MQTT_Broker_Pi

      - name: Configure CMake
        run: |
          cmake -S MQTT_Broker_Pi -B build/MQTT_Broker_Pi

      - name: Build
        run: |
          cmake --build build/MQTT_Broker_Pi --parallel

      - name: Run C executable smoke test
        run: |
          if [ -f build/MQTT_Broker_Pi/mqtt_broker ]; then
            echo "mqtt_broker wurde erfolgreich gebaut."
          else
            echo "mqtt_broker wurde nicht gefunden."
            exit 1
          fi

  python-check:
      name: Check and Test Python Project
      runs-on: ubuntu-latest

      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"

        - name: Install Python dependencies
          run: |
            python -m pip install --upgrade pip
            pip install ruff pytest

            if [ -f NiceGui_PC/requirements.txt ]; then
              pip install -r NiceGui_PC/requirements.txt
            fi

        - name: Check Python syntax
          run: |
            python -m compileall NiceGui_PC

        - name: Static analysis with ruff
          run: |
            ruff check NiceGui_PC

        - name: Run Python tests
          run: |
            PYTHONPATH=NiceGui_PC python -m pytest NiceGui_PC/tests