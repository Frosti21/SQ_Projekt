name: Build and Test

on:
  push:
  pull_request:

jobs:
  build-esp32:
    name: Build ESP32
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Sensor_ESP32
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3
          target: esp32
          path: Sensor_ESP32

  build-raspberry-pi:
    name: Build Raspberry Pi Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make g++

      - name: Configure MQTT_Broker_Pi
        run: |
          cmake -S MQTT_Broker_Pi -B build/MQTT_Broker_Pi

      - name: Build MQTT_Broker_Pi
        run: |
          cmake --build build/MQTT_Broker_Pi

  build-python:
    name: Check Python Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f NiceGui_PC/requirements.txt ]; then
            pip install -r NiceGui_PC/requirements.txt
          fi

      - name: Check Python syntax
        run: |
          python -m compileall NiceGui_PC